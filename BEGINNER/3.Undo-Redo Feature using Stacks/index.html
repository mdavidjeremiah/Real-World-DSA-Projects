<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undo/Redo Feature | Stack Implementation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Undo/Redo Text Editor</h1>
        <p class="subtitle">Implementing the Stack Data Structure</p>

        <!-- Toolbar -->
         <div class="toolbar">
            <button onclick="undo()" id="undoBtn" class="tool-btn">
                <span class="btn-icon">Undo (Ctrl + Z)</span>
            </button>
            <button onclick="redo()" id="redoBtn" class="tool-btn">
                <span class="btn-icon">Redo (Ctrl + Y)</span>
            </button>
            <button onclick="clearAll()"  class="tool-btn danger">
                <span class="btn-icon">Clear All</span>
            </button>
            <button onclick="showHistory()" class="tool-btn info">
                <span class="btn-icon">Show History</span>
            </button>
         </div>

         <!--Editor Area  -->
         <div class="editor-container">
            <textarea id="editor" placeholder="Start typing here... 
                Try Undo/Redo (Ctrl + Z/ Ctrl + Y)" 
                oninput="handleInput()">
            </textarea>

            <div class="editor-info">
                <span>Characters: <span id="charCount">0</span></span>
                <span>Words: <span id="wordCount">0</span></span>
                <span>Lines: <span id="lineCount">0</span></span>
            </div>
         </div>

         <!-- Stack Visualization -->
          <div class="visualization-container">
            <h2>Stack Visualization</h2>
            <div class="stack-grid">
                <div class="stack-card">
                    <h3>Undo Stack (History)</h3>
                    <div class="stack-visual" id="undoStack">
                        <div class="empty-stack">Empty - No actions yet</div>
                    </div>
                    <div class="stack-stats">
                        Size: <span id="undoSize">0</span> | Top: <span id="undoTop">None</span>
                    </div>
                </div>
               
                <div class="stack-card">
                    <h3>Redo Stack (Future)</h3>
                    <div class="stack-visual" id="redoStack">
                        <div class="empty-stack">Empty - Nothing to redo</div>
                    </div>
                    <div class="stack-stats">
                        Size: <span id="redoSize">0</span> | Top: <span id="redoTop">None</span>
                    </div>
                </div>
            </div>
          </div>

          <!-- Action History Panel -->
           <div class="history-panel" id="historyPanel" style="display: none;">
                <h3>Action History</h3>
                <div class="history-list" id="historyList"></div>
                <button onclick="closeHistory()" class="close-btn">Close</button>
           </div>

           <!-- Message Area -->
            <div class="message" id="message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
